<svg width="800" height="460" viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#16161e"/>
    </linearGradient>
  </defs>

  <!-- Window -->
  <rect width="800" height="460" rx="12" fill="url(#bg)"/>

  <!-- Title bar -->
  <rect width="800" height="40" rx="12" fill="#1f2335"/>
  <rect y="28" width="800" height="12" fill="#1f2335"/>
  <line x1="0" y1="40" x2="800" y2="40" stroke="#24283b" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="20" r="6" fill="#f7768e"/>
  <circle cx="40" cy="20" r="6" fill="#e0af68"/>
  <circle cx="60" cy="20" r="6" fill="#3fb950"/>

  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#565f89">Terminal</text>

  <!-- Terminal content -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">

    <!-- Clone -->
    <text x="20" y="68">
      <tspan fill="#565f89">$</tspan>
      <tspan fill="#c0caf5"> git clone https://github.com/thatrebeccarae/claude-code-skills.git</tspan>
    </text>
    <text x="20" y="86" fill="#565f89">Cloning into 'claude-code-skills'...</text>

    <!-- Setup -->
    <text x="20" y="114">
      <tspan fill="#565f89">$</tspan>
      <tspan fill="#c0caf5"> cd claude-code-skills/skill-packs/dtc-skill-pack</tspan>
    </text>
    <text x="20" y="138">
      <tspan fill="#565f89">$</tspan>
      <tspan fill="#c0caf5"> python scripts/setup.py</tspan>
    </text>

    <!-- Wizard output -->
    <text x="20" y="170" fill="#7dcfff">DTC Skill Pack — Setup Wizard</text>

    <text x="20" y="200"><tspan fill="#a7afd6">  [1/6] klaviyo-analyst ............ installed </tspan><tspan fill="#3fb950">&#x2713;</tspan></text>
    <text x="20" y="220"><tspan fill="#a7afd6">  [2/6] klaviyo-developer .......... installed </tspan><tspan fill="#3fb950">&#x2713;</tspan></text>
    <text x="20" y="240"><tspan fill="#a7afd6">  [3/6] shopify .................... installed </tspan><tspan fill="#3fb950">&#x2713;</tspan></text>
    <text x="20" y="260"><tspan fill="#a7afd6">  [4/6] google-analytics ........... installed </tspan><tspan fill="#3fb950">&#x2713;</tspan></text>
    <text x="20" y="280"><tspan fill="#a7afd6">  [5/6] looker-studio .............. installed </tspan><tspan fill="#3fb950">&#x2713;</tspan></text>
    <text x="20" y="300"><tspan fill="#a7afd6">  [6/6] pro-deck-builder ........... installed </tspan><tspan fill="#3fb950">&#x2713;</tspan></text>

    <text x="20" y="332" fill="#7dcfff">  Checking API connections...</text>
    <text x="20" y="352"><tspan fill="#a7afd6">  Klaviyo MCP .................... connected </tspan><tspan fill="#3fb950">&#x2713;</tspan></text>
    <text x="20" y="372"><tspan fill="#a7afd6">  Shopify Admin API .............. connected </tspan><tspan fill="#3fb950">&#x2713;</tspan></text>
    <text x="20" y="392"><tspan fill="#a7afd6">  GA4 Data API ................... connected </tspan><tspan fill="#3fb950">&#x2713;</tspan></text>

    <text x="20" y="432" fill="#7dcfff">Ready. Start a new Claude Code session and try: "Audit my Klaviyo flows"</text>

  </g>
</svg>
