<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
  </defs>

  <!-- Window -->
  <rect width="800" height="420" rx="12" fill="url(#bg)"/>

  <!-- Title bar -->
  <rect width="800" height="40" rx="12" fill="#242424"/>
  <rect y="28" width="800" height="12" fill="#242424"/>
  <line x1="0" y1="40" x2="800" y2="40" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#febc2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>

  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#7d8590">Terminal</text>

  <!-- Terminal content -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">

    <!-- Clone -->
    <text x="20" y="68">
      <tspan fill="#7d8590">$</tspan>
      <tspan fill="#e6e6e6"> git clone https://github.com/thatrebeccarae/claude-code-skills.git</tspan>
    </text>
    <text x="20" y="86" fill="#7d8590">Cloning into 'claude-code-skills'...</text>

    <!-- Setup -->
    <text x="20" y="114">
      <tspan fill="#7d8590">$</tspan>
      <tspan fill="#e6e6e6"> cd claude-code-skills/skill-packs/dtc-skill-pack</tspan>
    </text>
    <text x="20" y="138">
      <tspan fill="#7d8590">$</tspan>
      <tspan fill="#e6e6e6"> python scripts/setup.py</tspan>
    </text>

    <!-- Wizard output -->
    <text x="20" y="166" fill="#fdfdfe" font-weight="600">DTC Skill Pack — Setup Wizard</text>

    <text x="20" y="194" fill="#9BB29E">  [1/6] klaviyo-analyst ............ installed</text>
    <text x="20" y="214" fill="#9BB29E">  [2/6] klaviyo-developer .......... installed</text>
    <text x="20" y="234" fill="#9BB29E">  [3/6] shopify .................... installed</text>
    <text x="20" y="254" fill="#9BB29E">  [4/6] google-analytics ........... installed</text>
    <text x="20" y="274" fill="#9BB29E">  [5/6] looker-studio .............. installed</text>
    <text x="20" y="294" fill="#9BB29E">  [6/6] pro-deck-builder ........... installed</text>

    <text x="20" y="322" fill="#FCC560">  Checking API connections...</text>
    <text x="20" y="342" fill="#9BB29E">  Klaviyo MCP .................... connected</text>
    <text x="20" y="362" fill="#9BB29E">  Shopify Admin API .............. connected</text>
    <text x="20" y="382" fill="#9BB29E">  GA4 Data API ................... connected</text>

    <text x="20" y="410" fill="#fdfdfe" font-weight="600">Ready. Open Claude Code and start asking.</text>

  </g>
</svg>
